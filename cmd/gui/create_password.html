<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>Thiết lập ProcGuard</title>
  <style>
    body { font-family: Arial, sans-serif; background: #333; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    #login-box { background: #444; padding: 2rem; border-radius: 8px; text-align: center; }
    input { display: block; padding: .5rem; margin-bottom: 1rem; width: 250px; }
    button { background: #0bf; border: 0; padding: .5rem 1rem; border-radius: 4px; cursor: pointer; width: 100%; }
  </style>
</head>
<body>
  <div id="login-box">
    <h2>Tạo mật khẩu ProcGuard</h2>
    <p>Đây là lần đầu bạn chạy ProcGuard. Vui lòng tạo một mật khẩu.</p>
    <input type="password" id="password" placeholder="Nhập mật khẩu mới">
    <input type="password" id="confirm_password" placeholder="Xác nhận mật khẩu mới">
    <button onclick="createPassword()">Tạo Mật khẩu</button>
  </div>
  <script>
    async function createPassword() {
      const password = document.getElementById('password').value;
      const confirm_password = document.getElementById('confirm_password').value;

      if (password !== confirm_password) {
        alert("Mật khẩu không khớp.");
        return;
      }
      if (password.length < 1) {
        alert("Mật khẩu không thể bỏ trống.");
        return;
      }

      const res = await fetch('/api/create_password', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ password: password })
      });

      if (res.ok) {
        // On success, the server will set a cookie and we can reload to the main dashboard.
        window.location.reload();
      } else {
        alert("Không thể tạo mật khẩu.");
      }
    }
    // Allow creation on pressing Enter
    document.getElementById('confirm_password').addEventListener('keyup', function(event) {
        if (event.key === "Enter") {
            createPassword();
        }
    });
  </script>
</body>
</html>
